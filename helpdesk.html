<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="utf-8">
    <meta name="description" content="HTML form">
     <meta name="keywords" content="HTML, Form, tags">
    <meta name="author" content="Dylan Yang Cheng Jun">
     <title>CWA Help Desk Appointment</title>
    </head>

    <body>
        <p><a href="http://www.swin.edu.au">
        <img src="logo.png" alt="Swinburne Logo" width="199" height="100">    
        </a></p>

        <h1>CWA Help Desk Appointment</h1>

        <form method="post" action="http://mercury.swin.edu.au/it000000/formtest.php">
            <p>The Help Desk is located in ATC620. Open 10:30 to 19:00 Monday to Friday</p>
            <p>Check Blackboard for when CWA tutors will be there.</p>

            <fieldset>
                <legend>Student details</legend>
                <p><label for="studentid">Student ID</label> 
                    <input type="text" name="studentid" id="studentid" pattern="[0,9]{7,10}" required="required">
                </p>
                <p><label for="firstname">Given Name</label>
                    <input type="text" name="firstname" id="firstname" pattern="[A-Za-z]" maxlength="15" required="required">
                    <label for="lastname">Family Name</label>
                    <input type="text" name="lastname" id="lastname" pattern="[A-Za-z]" maxlength="15" required="required">
                </p>
            </fieldset>

            <fieldset>
                <legend>Your Unit</legend>
                <p><label for="cos10011">COS10011</label>
                    <input type="radio" name="cos10011" id="cos10011" value="cos10011">
                    <label for="cos60004">COS60004</label>
                    <input type="radio" name="cos60004" id="cos60004" value="cos60004">
                    <label for="cos60007">COS60007</label>
                    <input type="radio" name="cos60007" id="cos60007" value="cos60007">
                </p>

                <p><label for="tutor">Your Tutor</label>
                    <select name="tutor" id="tutor">
                        <option value="">Please Select</option>
                        <option value="carson">Carson</option>
                        <option value="angela">Angela</option>
                        <option value="liason">Liason</option>
                        <option value="yisang">Yi Sang</option>
                        <option value="cathy">Cathy</option>
                        <option value="other">Other</option>
                    </select>
                </p>
            </fieldset>

            <fieldset>
                <legend>Issue</legend>
                <p><label for="html">HTML</label>
                    <input type="checkbox" id="html" name="category[]" value="html" checked="checked">
                    <label for="css">CSS</label>
                    <input type="checkbox" id="css" name="category[]" value="css">
                    <label for="javascript">JavaScript</label>
                    <input type="checkbox" id="javascript" name="category[]" value="javascript">
                    <label for="php">PHP</label>
                    <input type="checkbox" id="php" name="category[]" value="php">
                    <label for="mysql">MySQL</label>
                    <input type="checkbox" id="mysql" name="category[]" value="mysql">
                </p>
                <p><label for="description">Description of Issue</label></p>
                <p>
                    <textarea id="description" name="description"></textarea>
                </p>
            </fieldset>

            <fieldset>
                <legend>Preferred Date/Time</legend>
                <p><label for="date">Date</label>
                    <input type="text" name="date" id="date" placeholder="dd-mm-yyyy" pattern="\d{2}/\d{2}/\d{4}" maxlength="10" size="10">
                </p>
                <p><label for="time">Time</label>
                    <input type="text" name="time" id="time" placeholder="00:00" pattern="([01][0-9]|[02][0-3]):[0-5][0-9]" maxlength="5" size="5">
                </p>
            </fieldset>

            <input type= "submit" value="Book">
	        <input type= "reset" value="Reset Form">
        </form>
    </body>
</html>
